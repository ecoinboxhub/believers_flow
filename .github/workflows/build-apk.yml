name: Build Signed APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug - Environment info
        run: |
          echo "=== Runner Environment ==="
          echo "OS: $(uname -a)"
          echo "GitHub ref: ${{ github.ref }}"
          echo "GitHub event: ${{ github.event_name }}"
          echo "Tag: ${{ github.ref_name }}"
          echo "================================"

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Debug - Java version
        run: |
          echo "=== Java Version ==="
          java -version
          echo "JAVA_HOME: $JAVA_HOME"
          echo "===================="

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      - name: Debug - Frontend build output
        run: |
          echo "=== Frontend Build Output ==="
          ls -la frontend/dist/ 2>/dev/null || echo "frontend/dist/ not found"
          echo "============================="

      - name: Sync Capacitor
        working-directory: frontend
        run: npx cap sync android

      - name: Debug - Capacitor sync result
        run: |
          echo "=== Capacitor Sync Result ==="
          echo "frontend/android assets:"
          ls -la frontend/android/app/src/main/assets/public/ 2>/dev/null || echo "NOT FOUND"
          echo "mobile assets (before copy):"
          ls -la mobile/app/src/main/assets/public/ 2>/dev/null || echo "NOT FOUND"
          echo "============================="

      - name: Copy Capacitor generated files to mobile project
        run: |
          cp -r frontend/android/capacitor-cordova-android-plugins mobile/capacitor-cordova-android-plugins
          cp frontend/android/capacitor.settings.gradle mobile/capacitor.settings.gradle
          echo "Copied capacitor-cordova-android-plugins and capacitor.settings.gradle"

      - name: Copy web assets to mobile project
        run: |
          mkdir -p mobile/app/src/main/assets/public
          rm -rf mobile/app/src/main/assets/public/*
          cp -r frontend/android/app/src/main/assets/public/* mobile/app/src/main/assets/public/
          echo "Web assets copied successfully"
          echo "=== Mobile assets (after copy) ==="
          ls -la mobile/app/src/main/assets/public/
          echo "==================================="

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > believers-flow.jks
          cp believers-flow.jks mobile/app/believers-flow-release.jks

      - name: Debug - Keystore and signing
        run: |
          echo "=== Signing Configuration ==="
          echo "Keystore file exists: $(test -f believers-flow.jks && echo YES || echo NO)"
          echo "Keystore size: $(wc -c < believers-flow.jks 2>/dev/null || echo 0) bytes"
          echo "KEY_ALIAS secret set: ${{ secrets.KEY_ALIAS != '' && 'YES' || 'NO' }}"
          echo "KEYSTORE_PASSWORD secret set: ${{ secrets.KEYSTORE_PASSWORD != '' && 'YES' || 'NO' }}"
          echo "KEY_PASSWORD secret set: ${{ secrets.KEY_PASSWORD != '' && 'YES' || 'NO' }}"
          echo "============================="

      - name: Link node_modules for Gradle
        run: ln -s frontend/node_modules node_modules

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14.3'

      - name: Build signed APK
        run: |
          cd mobile
          gradle assembleRelease \
            -Pandroid.injected.signing.store.file=../believers-flow.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            --stacktrace

      - name: Debug - Gradle build outputs
        run: |
          echo "=== Gradle Build Outputs ==="
          echo "APK output directory tree:"
          find mobile/app/build/outputs -type f 2>/dev/null || echo "Build output directory not found"
          echo ""
          echo "All APK files:"
          find mobile/app/build -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
          echo "============================="

      - name: Verify APK exists
        run: |
          APK_PATH="mobile/app/build/outputs/apk/release/app-release.apk"
          echo "=== APK Verification ==="
          if [ ! -f "$APK_PATH" ]; then
            echo "FATAL: APK not found at $APK_PATH"
            echo ""
            echo "Expected path: $APK_PATH"
            echo ""
            echo "Build output directory contents:"
            find mobile/app/build/outputs -type f 2>/dev/null || echo "  (directory does not exist)"
            echo ""
            echo "All files in mobile/app/build:"
            find mobile/app/build -type f -name "*.apk" 2>/dev/null || echo "  (no APK files found)"
            echo ""
            echo "Gradle assembleRelease may have failed. Check the build step logs above."
            exit 1
          fi
          APK_SIZE=$(wc -c < "$APK_PATH")
          echo "APK found: $APK_PATH"
          echo "APK size: $APK_SIZE bytes ($(echo "scale=2; $APK_SIZE / 1048576" | bc) MB)"
          echo "APK filename: $(basename $APK_PATH)"
          echo "========================"

      - name: Prepare release asset
        run: |
          cp mobile/app/build/outputs/apk/release/app-release.apk BelieversFlow.apk
          echo "=== Release Asset ==="
          echo "Filename: BelieversFlow.apk"
          echo "Size: $(wc -c < BelieversFlow.apk) bytes"
          echo "Full path: $(pwd)/BelieversFlow.apk"
          echo "====================="

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: believersflow-release
          path: BelieversFlow.apk
          retention-days: 30

      - name: Delete existing release and assets for rebuilds
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          echo "=== Checking for existing release: $TAG ==="

          RELEASE_ID=$(gh release view "$TAG" --repo ${{ github.repository }} --json id -q '.id' 2>/dev/null || echo "")

          if [ -n "$RELEASE_ID" ]; then
            echo "Found existing release (ID: $RELEASE_ID)"
            echo "Listing existing assets:"
            gh api "repos/${{ github.repository }}/releases/$RELEASE_ID/assets" --jq '.[] | {name: .name, id: .id, size: .size}' 2>/dev/null || echo "  (no assets)"

            ASSET_IDS=$(gh api "repos/${{ github.repository }}/releases/$RELEASE_ID/assets" --jq '.[].id' 2>/dev/null || echo "")
            for ASSET_ID in $ASSET_IDS; do
              echo "Deleting asset ID: $ASSET_ID"
              gh api "repos/${{ github.repository }}/releases/assets/$ASSET_ID" -X DELETE 2>/dev/null || echo "  Failed to delete asset $ASSET_ID"
            done

            echo "Deleting release (ID: $RELEASE_ID)..."
            gh api "repos/${{ github.repository }}/releases/$RELEASE_ID" -X DELETE 2>/dev/null || echo "  Failed to delete release"
            echo "Existing release deleted."
          else
            echo "No existing release found for $TAG"
          fi

          echo "Checking for existing tag..."
          git tag -l "$TAG" | while read T; do
            echo "Deleting local tag: $T"
            git tag -d "$T" 2>/dev/null || true
          done
          echo "Deleting remote tag..."
          git push origin ":refs/tags/$TAG" 2>/dev/null || echo "  Remote tag does not exist or already deleted"
          echo "==================================="

      - name: Create Git tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${{ github.ref_name }}"
          echo "Ensuring tag $TAG exists locally..."
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "$TAG" HEAD 2>/dev/null || true
          git push origin "$TAG" --force 2>/dev/null || echo "Tag push handled"
          echo "Tag $TAG is ready"

      - name: Create or update GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "BelieversFlow ${{ github.ref_name }}"
          body: |
            ## BelieversFlow ${{ github.ref_name }}

            ### Android APK
            Download and install `BelieversFlow.apk` on your Android device.

            Permanent download URL (always points to latest release):
            [https://github.com/ecoinboxhub/believers_flow/releases/latest/download/BelieversFlow.apk](https://github.com/ecoinboxhub/believers_flow/releases/latest/download/BelieversFlow.apk)

            ### What's New
            See [CHANGELOG.md](https://github.com/ecoinboxhub/believers_flow/blob/main/CHANGELOG.md) for details.
          files: BelieversFlow.apk
          draft: false
          prerelease: false
          tag_name: ${{ github.ref_name }}
          make_latest: true

      - name: Verify release asset - comprehensive check
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          EXPECTED_NAME="BelieversFlow.apk"
          echo "=== Release Verification for $TAG ==="
          echo ""

          echo "1. Checking release exists..."
          RELEASE_JSON=$(gh release view "$TAG" --repo ${{ github.repository }} --json tagName,name,assets,publishedAt,isDraft,isPrerelease 2>/dev/null || echo "")
          if [ -z "$RELEASE_JSON" ]; then
            echo "   FATAL: Release not found for tag $TAG"
            exit 1
          fi
          echo "   Release found:"
          echo "$RELEASE_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'   Name: {d[\"name\"]}'); print(f'   Tag: {d[\"tagName\"]}'); print(f'   Published: {d[\"publishedAt\"]}'); print(f'   Draft: {d[\"isDraft\"]}'); print(f'   Prerelease: {d[\"isPrerelease\"]}'); print(f'   Assets: {len(d[\"assets\"])}')"
          echo ""

          echo "2. Checking APK asset exists..."
          RELEASE_ID=$(gh release view "$TAG" --repo ${{ github.repository }} --json id -q '.id')
          ASSETS_JSON=$(gh api "repos/${{ github.repository }}/releases/$RELEASE_ID/assets" 2>/dev/null)
          ASSET_COUNT=$(echo "$ASSETS_JSON" | python3 -c "import sys,json; print(len(json.load(sys.stdin)))")
          echo "   Total assets: $ASSET_COUNT"

          if [ "$ASSET_COUNT" -eq 0 ]; then
            echo "   FATAL: No assets found in release!"
            exit 1
          fi

          echo "   All assets:"
          echo "$ASSETS_JSON" | python3 -c "import sys,json; [print(f'     - {a[\"name\"]} ({a[\"size\"]} bytes, state={a[\"state\"]})') for a in json.load(sys.stdin)]"
          echo ""

          echo "3. Checking asset name is exactly '$EXPECTED_NAME'..."
          MATCHED_ASSET=$(echo "$ASSETS_JSON" | python3 -c "
          import sys,json
          assets = json.load(sys.stdin)
          for a in assets:
              if a['name'] == '$EXPECTED_NAME':
                  print(json.dumps(a))
                  break
          ")

          if [ -z "$MATCHED_ASSET" ]; then
            echo "   FATAL: Asset named '$EXPECTED_NAME' not found!"
            echo "   Available assets:"
            echo "$ASSETS_JSON" | python3 -c "import sys,json; [print(f'     - {a[\"name\"]}') for a in json.load(sys.stdin)]"
            exit 1
          fi
          echo "   Asset found with correct name!"
          echo ""

          echo "4. Checking asset has non-zero size..."
          ASSET_SIZE=$(echo "$MATCHED_ASSET" | python3 -c "import sys,json; print(json.load(sys.stdin)['size'])")
          if [ "$ASSET_SIZE" -eq 0 ]; then
            echo "   FATAL: Asset has zero size!"
            exit 1
          fi
          echo "   Size: $ASSET_SIZE bytes ($(echo "scale=2; $ASSET_SIZE / 1048576" | bc) MB)"
          echo ""

          echo "5. Checking asset state is 'uploaded'..."
          ASSET_STATE=$(echo "$MATCHED_ASSET" | python3 -c "import sys,json; print(json.load(sys.stdin)['state'])")
          if [ "$ASSET_STATE" != "uploaded" ]; then
            echo "   FATAL: Asset state is '$ASSET_STATE', expected 'uploaded'!"
            exit 1
          fi
          echo "   State: $ASSET_STATE"
          echo ""

          echo "6. Checking download URL..."
          DOWNLOAD_URL=$(echo "$MATCHED_ASSET" | python3 -c "import sys,json; print(json.load(sys.stdin)['browser_download_url'])")
          echo "   URL: $DOWNLOAD_URL"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DOWNLOAD_URL" 2>/dev/null || echo "000")
          echo "   HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "   WARNING: Download URL returned HTTP $HTTP_STATUS"
            echo "   (This may be expected for private repos when using unauthenticated requests)"
          fi
          echo ""

          echo "7. Checking permanent /latest/ URL..."
          LATEST_URL="https://github.com/ecoinboxhub/believers_flow/releases/latest/download/$EXPECTED_NAME"
          echo "   URL: $LATEST_URL"
          LATEST_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$LATEST_URL" 2>/dev/null || echo "000")
          echo "   HTTP status: $LATEST_STATUS"
          if [ "$LATEST_STATUS" -ne 200 ]; then
            echo "   WARNING: Latest URL returned HTTP $LATEST_STATUS"
            echo "   (This may be expected for private repos when using unauthenticated requests)"
          fi
          echo ""

          echo "============================================"
          echo "RELEASE VERIFICATION COMPLETE"
          echo "Tag: $TAG"
          echo "Asset: $EXPECTED_NAME"
          echo "Size: $ASSET_SIZE bytes"
          echo "Download URL: $DOWNLOAD_URL"
          echo "Latest URL: $LATEST_URL"
          echo "============================================"
