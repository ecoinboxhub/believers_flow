name: Build Signed APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}

      - name: Sync Capacitor
        working-directory: frontend
        run: npx cap sync android

      - name: Copy Capacitor files to mobile project
        run: |
          cp -r frontend/android/capacitor-cordova-android-plugins mobile/capacitor-cordova-android-plugins
          cp frontend/android/capacitor.settings.gradle mobile/capacitor.settings.gradle
          mkdir -p mobile/app/src/main/assets/public
          rm -rf mobile/app/src/main/assets/public/*
          cp -r frontend/android/app/src/main/assets/public/* mobile/app/src/main/assets/public/

      - name: Link node_modules for Gradle
        run: ln -s frontend/node_modules node_modules

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: printf '%s' "$KEYSTORE_BASE64" | base64 -d > mobile/app/app-release.jks

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14.3'

      - name: Build signed APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          cd mobile
          gradle assembleRelease --stacktrace

      - name: Verify APK
        run: |
          APK_PATH="mobile/app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "APK not found at $APK_PATH"
            find mobile/app/build/outputs -type f 2>/dev/null || echo "Build output directory does not exist"
            exit 1
          fi
          echo "APK found: $(wc -c < "$APK_PATH") bytes"

      - name: Prepare release asset
        run: cp mobile/app/build/outputs/apk/release/app-release.apk BelieversFlow.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: believersflow-release
          path: BelieversFlow.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "BelieversFlow ${{ github.ref_name }}"
          body: |
            ## BelieversFlow ${{ github.ref_name }}

            Download and install `BelieversFlow.apk` on your Android device.

            **Permanent download:** [BelieversFlow.apk](https://github.com/ecoinboxhub/believers_flow/releases/latest/download/BelieversFlow.apk)

            See [CHANGELOG.md](https://github.com/ecoinboxhub/believers_flow/blob/main/CHANGELOG.md) for details.
          files: BelieversFlow.apk
          draft: false
          prerelease: false
          tag_name: ${{ github.ref_name }}
          make_latest: true
