<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="100%" height="100%" style="background:#f8f6f3;font-family:Calibri,Segoe UI,sans-serif;">
  <defs>
    <filter id="s" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1a1a2e" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">BelieversFlow Architecture</text>
  <text x="450" y="50" text-anchor="middle" font-size="12" fill="#8c8caa">Offline-first  ·  Zero server cost for core features</text>

  <!-- Down arrows between layers -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="4" refY="6" orient="auto">
      <path d="M0,0 L8,6 L0,12 Z" fill="#bbb"/>
    </marker>
  </defs>

  <!-- === LAYER 1: USER === -->
  <rect x="30" y="70" width="840" height="60" rx="8" fill="white" stroke="#7b2d8e" stroke-width="1.5" filter="url(#s)"/>
  <text x="450" y="94" text-anchor="middle" font-size="15" font-weight="bold" fill="#7b2d8e">User</text>
  <text x="450" y="114" text-anchor="middle" font-size="12" fill="#1a1a2e">Opens in web browser (PWA)  ·  Installs from Google Play (Android APK)</text>

  <!-- Arrow -->
  <line x1="450" y1="130" x2="450" y2="155" stroke="#bbb" stroke-width="2" marker-end="url(#arr)"/>

  <!-- === LAYER 2: APP (React SPA) === -->
  <rect x="30" y="160" width="840" height="85" rx="8" fill="white" stroke="#3a7bd5" stroke-width="1.5" filter="url(#s)"/>
  <text x="450" y="185" text-anchor="middle" font-size="15" font-weight="bold" fill="#3a7bd5">App — React SPA (single file, no router)</text>
  <text x="450" y="205" text-anchor="middle" font-size="12" fill="#1a1a2e">Tasks  ·  Faith  ·  Diary  ·  Bible  ·  Hymns  ·  Devotional  ·  Settings</text>
  <text x="450" y="225" text-anchor="middle" font-size="10" fill="#8c8caa">1,932 lines  ·  7 views rendered by state  ·  Works fully offline</text>

  <!-- Arrow -->
  <line x1="450" y1="245" x2="450" y2="270" stroke="#bbb" stroke-width="2" marker-end="url(#arr)"/>

  <!-- === LAYER 3: DATA + APIs === -->
  <rect x="30" y="275" width="840" height="115" rx="8" fill="white" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Local Storage -->
  <rect x="50" y="288" width="240" height="88" rx="6" fill="white" stroke="#c84646" stroke-width="1.5" filter="url(#s)"/>
  <text x="170" y="312" text-anchor="middle" font-size="14" font-weight="bold" fill="#c84646">Local Storage</text>
  <text x="170" y="332" text-anchor="middle" font-size="11" fill="#1a1a2e">16 btf_* keys in browser</text>
  <text x="170" y="350" text-anchor="middle" font-size="11" fill="#1a1a2e">Tasks  ·  Prayers  ·  Diary  ·  Settings</text>
  <text x="170" y="368" text-anchor="middle" font-size="10" fill="#8c8caa">All user data — NO server database</text>

  <!-- Bundled Content -->
  <rect x="320" y="288" width="240" height="88" rx="6" fill="white" stroke="#4cb464" stroke-width="1.5" filter="url(#s)"/>
  <text x="440" y="312" text-anchor="middle" font-size="14" font-weight="bold" fill="#4cb464">Bundled Content</text>
  <text x="440" y="332" text-anchor="middle" font-size="11" fill="#1a1a2e">1,001 Hymns (408 KB)</text>
  <text x="440" y="350" text-anchor="middle" font-size="11" fill="#1a1a2e">365 Devotionals (315 KB)</text>
  <text x="440" y="368" text-anchor="middle" font-size="10" fill="#8c8caa">Loaded on demand via dynamic import()</text>

  <!-- External APIs -->
  <rect x="590" y="288" width="260" height="88" rx="6" fill="white" stroke="#d4883c" stroke-width="1.5" filter="url(#s)"/>
  <text x="720" y="312" text-anchor="middle" font-size="14" font-weight="bold" fill="#d4883c">External APIs</text>
  <text x="720" y="332" text-anchor="middle" font-size="11" fill="#1a1a2e">GROQ AI — llama-3.3-70b (chat, explain, commentary)</text>
  <text x="720" y="350" text-anchor="middle" font-size="11" fill="#1a1a2e">bible-api.com — KJV text (cached 7 days)</text>
  <text x="720" y="368" text-anchor="middle" font-size="10" fill="#8c8caa">Backend proxies AI calls  ·  Bible cached via SW</text>

  <!-- Arrow -->
  <line x1="450" y1="390" x2="450" y2="415" stroke="#bbb" stroke-width="2" marker-end="url(#arr)"/>

  <!-- === LAYER 4: BACKEND === -->
  <rect x="30" y="420" width="400" height="60" rx="8" fill="white" stroke="#7b2d8e" stroke-width="1.5" filter="url(#s)"/>
  <text x="230" y="444" text-anchor="middle" font-size="14" font-weight="bold" fill="#7b2d8e">FastAPI Backend (Python, 358 lines)</text>
  <text x="230" y="464" text-anchor="middle" font-size="11" fill="#1a1a2e">Proxies GROQ  ·  Serves hymn tunes  ·  Serverless on Vercel</text>

  <rect x="460" y="420" width="410" height="60" rx="8" fill="white" stroke="#5a5a5a" stroke-width="1.5" filter="url(#s)"/>
  <text x="665" y="444" text-anchor="middle" font-size="14" font-weight="bold" fill="#5a5a5a">Deployment</text>
  <text x="665" y="464" text-anchor="middle" font-size="11" fill="#1a1a2e">Vercel CDN  ·  GitHub Actions CI/CD  ·  GitHub Releases (APK)</text>

  <!-- Caption -->
  <rect x="30" y="495" width="840" height="20" rx="4" fill="#1a1a2e"/>
  <text x="450" y="509" text-anchor="middle" font-size="11" fill="#aaaacc">Bundle: 987 KB JS · 76 KB CSS · PWA: 16 entries (1.47 MB) · Build: ~300 ms · 6 npm dependencies</text>
</svg>
